<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM AI First - Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
            surface: { 800: '#1e1b2e', 900: '#0f0d1a', 950: '#0a0814' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 40px rgba(99,102,241,0.6); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar { transition: width 0.5s ease; }
    input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,0.5); }
    .check-mark { animation: checkPop 0.3s ease-out; }
    @keyframes checkPop { from { transform: scale(0); } 50% { transform: scale(1.2); } to { transform: scale(1); } }
    .toast { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-surface-950 text-white min-h-screen flex items-center justify-center p-4">

  <div id="app" class="w-full max-w-2xl">
    <!-- Progress indicator -->
    <div class="mb-8 flex items-center justify-center gap-2" id="progress-dots"></div>
    <!-- Step container -->
    <div id="step-container" class="bg-surface-900 rounded-2xl border border-white/5 shadow-2xl overflow-hidden"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="fixed bottom-6 right-6 hidden"></div>

  <script>
    // ─── State ──────────────────────────────────────────────────────────────
    // Restore state from localStorage if available
    const saved = JSON.parse(localStorage.getItem('crm-setup-state') || 'null');
    const state = {
      currentStep: saved?.currentStep || 0,
      supabaseUrl: saved?.supabaseUrl || '',
      anonKey: saved?.anonKey || '',
      serviceRoleKey: saved?.serviceRoleKey || '',
      accessToken: saved?.accessToken || '',
      connectionResults: null,
      migrationMode: null,
    };

    function saveState() {
      localStorage.setItem('crm-setup-state', JSON.stringify({
        currentStep: state.currentStep,
        supabaseUrl: state.supabaseUrl,
        anonKey: state.anonKey,
        serviceRoleKey: state.serviceRoleKey,
        accessToken: state.accessToken,
      }));
    }

    const STEPS = ['welcome', 'create-supabase', 'credentials', 'test-connection', 'run-migrations', 'done'];

    // ─── Helpers ────────────────────────────────────────────────────────────
    function goTo(step) { state.currentStep = step; saveState(); renderProgressDots(); renderStep(); }
    function next() { goTo(state.currentStep + 1); }
    function prev() { goTo(state.currentStep - 1); }
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      const bg = type === 'success' ? 'bg-green-500/90' : 'bg-red-500/90';
      el.innerHTML = `<div class="toast ${bg} text-white px-4 py-2 rounded-xl text-sm font-medium shadow-lg">${msg}</div>`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    function renderProgressDots() {
      const c = document.getElementById('progress-dots');
      c.innerHTML = STEPS.map((_, i) => {
        const active = i === state.currentStep;
        const done = i < state.currentStep;
        const color = done ? 'bg-green-500' : active ? 'bg-brand-500 pulse-glow' : 'bg-white/20';
        const size = active ? 'w-8 h-3 rounded-full' : 'w-3 h-3 rounded-full';
        return `<div class="${color} ${size} transition-all duration-300"></div>`;
      }).join('');
    }

    // ─── SVG Icons ──────────────────────────────────────────────────────────
    const icons = {
      bolt: `<svg class="w-10 h-10 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`,
      sparkles: `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>`,
      key: `<svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>`,
      db: `<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>`,
      check: `<svg class="w-10 h-10 text-green-400 check-mark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
      external: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`,
      spinner: `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin"></div>`,
      checkSmall: `<svg class="w-5 h-5 text-green-400 check-mark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`,
      xSmall: `<svg class="w-5 h-5 text-red-400 check-mark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>`,
      copy: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>`,
    };

    // ─── Step renderers ─────────────────────────────────────────────────────
    function renderStep() {
      const container = document.getElementById('step-container');
      const renderers = [renderWelcome, renderCreateSupabase, renderCredentials, renderTestConnection, renderRunMigrations, renderDone];
      container.innerHTML = `<div class="fade-in">${renderers[state.currentStep]()}</div>`;
    }

    // ── Step 1: Welcome ─────────────────────────────────────────────────────
    function renderWelcome() {
      return `
        <div class="p-10 text-center">
          <div class="w-20 h-20 bg-brand-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6">${icons.bolt}</div>
          <h1 class="text-3xl font-bold mb-3">CRM AI First</h1>
          <p class="text-white/60 text-lg mb-2">Seu CRM inteligente com IA integrada</p>
          <p class="text-white/40 mb-8">Vamos configurar tudo em poucos minutos. Sem complicacao.</p>
          <button onclick="next()" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-8 rounded-xl transition-all hover:scale-105 text-lg">
            Configurar meu CRM
          </button>
          <p class="text-white/30 text-sm mt-6">Tempo estimado: 5 minutos</p>
        </div>`;
    }

    // ── Step 2: Create Supabase ─────────────────────────────────────────────
    function renderCreateSupabase() {
      return `
        <div class="p-10">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center">${icons.sparkles}</div>
            <h2 class="text-2xl font-bold">Criar projeto no Supabase</h2>
          </div>
          <div class="space-y-4 mb-8">
            ${stepCard(1, 'Acesse o Supabase', 'Crie uma conta gratuita (nao precisa de cartao de credito)', 'https://supabase.com/dashboard', 'Abrir Supabase')}
            ${stepCard(2, 'Crie um novo projeto', 'Clique em <span class="text-white/70">"New Project"</span>, escolha um nome e defina uma senha para o banco.')}
            ${stepCard(3, 'Aguarde ficar pronto', 'Leva 1-2 minutos. Quando estiver pronto, volte aqui.')}
          </div>
          <div class="flex justify-between">
            <button onclick="prev()" class="text-white/50 hover:text-white py-2 px-4 rounded-lg transition-colors">Voltar</button>
            <button onclick="next()" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-6 rounded-xl transition-all">Ja criei o projeto</button>
          </div>
        </div>`;
    }

    function stepCard(num, title, desc, link, linkText) {
      return `
        <div class="bg-surface-800 rounded-xl p-5 border border-white/5">
          <div class="flex items-start gap-3">
            <span class="bg-brand-600 text-white text-sm font-bold w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">${num}</span>
            <div>
              <p class="font-medium">${title}</p>
              <p class="text-white/50 text-sm mt-1">${desc}</p>
              ${link ? `<a href="${link}" target="_blank" class="inline-flex items-center gap-2 mt-2 text-brand-500 hover:text-brand-400 text-sm font-medium">${linkText} ${icons.external}</a>` : ''}
            </div>
          </div>
        </div>`;
    }

    // ── Step 3: Credentials ─────────────────────────────────────────────────
    function renderCredentials() {
      return `
        <div class="p-10">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-amber-500/20 rounded-xl flex items-center justify-center">${icons.key}</div>
            <h2 class="text-2xl font-bold">Colar credenciais</h2>
          </div>
          <p class="text-white/50 mb-6">No painel do Supabase, va em <span class="text-white/80 font-medium">Settings &gt; API</span> e copie:</p>
          <div class="space-y-5 mb-8">
            <div>
              <label class="block text-sm font-medium text-white/70 mb-2">Project URL</label>
              <input id="input-url" type="url" value="${state.supabaseUrl}" placeholder="https://xxxxx.supabase.co"
                class="w-full bg-surface-800 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30" />
              <p class="text-white/30 text-xs mt-1">Settings &gt; API &gt; Project URL</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-white/70 mb-2">Anon Key <span class="text-white/40">(publica)</span></label>
              <input id="input-anon" type="text" value="${state.anonKey}" placeholder="eyJhbGciOiJIUzI1NiIs..."
                class="w-full bg-surface-800 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 font-mono text-sm" />
              <p class="text-white/30 text-xs mt-1">Settings &gt; API &gt; anon public</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-white/70 mb-2">Service Role Key <span class="text-amber-400/80 text-xs">(secreta - so usada agora)</span></label>
              <input id="input-service" type="password" value="${state.serviceRoleKey}" placeholder="eyJhbGciOiJIUzI1NiIs..."
                class="w-full bg-surface-800 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 font-mono text-sm" />
              <p class="text-white/30 text-xs mt-1">Settings &gt; API &gt; service_role (clique em "Reveal")</p>
              <p class="text-amber-400/60 text-xs mt-1">Esta chave NAO sera salva. So usada para verificar as tabelas.</p>
            </div>
          </div>
          <div id="cred-error" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-4 text-red-400 text-sm"></div>
          <div class="flex justify-between">
            <button onclick="prev()" class="text-white/50 hover:text-white py-2 px-4 rounded-lg transition-colors">Voltar</button>
            <button onclick="validateAndNext()" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-6 rounded-xl transition-all">Testar conexao</button>
          </div>
        </div>`;
    }

    function validateAndNext() {
      const url = document.getElementById('input-url').value.trim().replace(/\/+$/, '');
      const anon = document.getElementById('input-anon').value.trim();
      const service = document.getElementById('input-service').value.trim();
      const errEl = document.getElementById('cred-error');

      if (!url || !url.match(/^https:\/\/[a-z0-9-]+\.supabase\.co$/i)) {
        errEl.textContent = 'URL invalida. Deve ser: https://xxxxx.supabase.co';
        errEl.classList.remove('hidden'); return;
      }
      const jwtRe = /^eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/;
      if (!anon || !jwtRe.test(anon)) {
        errEl.textContent = 'Anon Key invalida. Deve comecar com "eyJ..." (formato JWT)';
        errEl.classList.remove('hidden'); return;
      }
      if (!service || !jwtRe.test(service)) {
        errEl.textContent = 'Service Role Key invalida. Deve comecar com "eyJ..." (formato JWT)';
        errEl.classList.remove('hidden'); return;
      }

      state.supabaseUrl = url;
      state.anonKey = anon;
      state.serviceRoleKey = service;
      saveState();
      next();
    }

    // ── Step 4: Test Connection ─────────────────────────────────────────────
    function renderTestConnection() {
      setTimeout(runConnectionTest, 500);
      return `
        <div class="p-10 text-center">
          <h2 class="text-2xl font-bold mb-6">Testando conexao...</h2>
          <div class="space-y-4 max-w-sm mx-auto text-left mb-8">
            ${checkRow('check-url', 'icon-url', 'URL do projeto')}
            ${checkRow('check-anon', 'icon-anon', 'Anon Key')}
            ${checkRow('check-service', 'icon-service', 'Service Role Key')}
          </div>
          <div id="connection-actions" class="hidden">
            <div id="connection-error" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-4 text-red-400 text-sm"></div>
            <div class="flex justify-center gap-3">
              <button onclick="goTo(2)" class="text-white/50 hover:text-white py-2 px-4 rounded-lg transition-colors">Corrigir credenciais</button>
              <button id="btn-next-test" onclick="next()" class="hidden bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-6 rounded-xl transition-all">Criar tabelas</button>
            </div>
          </div>
        </div>`;
    }

    function checkRow(rowId, iconId, label) {
      return `<div class="flex items-center gap-3 bg-surface-800 rounded-xl p-4" id="${rowId}">
        <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center" id="${iconId}">${icons.spinner}</div>
        <span class="text-white/70">${label}</span>
      </div>`;
    }

    function setIcon(id, success) {
      const el = document.getElementById(id);
      el.innerHTML = success ? icons.checkSmall : icons.xSmall;
      el.className = `w-6 h-6 rounded-full ${success ? 'bg-green-500/20' : 'bg-red-500/20'} flex items-center justify-center`;
    }

    async function runConnectionTest() {
      try {
        const res = await fetch('/api/test-connection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: state.supabaseUrl, anonKey: state.anonKey, serviceRoleKey: state.serviceRoleKey }),
        });
        const data = await res.json();
        const r = data.results;

        setIcon('icon-url', r.url); await delay(400);
        setIcon('icon-anon', r.anonKey); await delay(400);
        setIcon('icon-service', r.serviceRoleKey);

        document.getElementById('connection-actions').classList.remove('hidden');
        if (r.url && r.anonKey && r.serviceRoleKey) {
          document.getElementById('btn-next-test').classList.remove('hidden');
        } else {
          const errEl = document.getElementById('connection-error');
          errEl.textContent = 'Algumas verificacoes falharam. Verifique suas credenciais.';
          errEl.classList.remove('hidden');
        }
      } catch (err) {
        setIcon('icon-url', false); setIcon('icon-anon', false); setIcon('icon-service', false);
        document.getElementById('connection-actions').classList.remove('hidden');
        document.getElementById('connection-error').textContent = 'Erro: ' + err.message;
        document.getElementById('connection-error').classList.remove('hidden');
      }
    }

    // ── Step 5: Run Migrations ──────────────────────────────────────────────
    function renderRunMigrations() {
      return `
        <div class="p-10">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center">${icons.db}</div>
            <h2 class="text-2xl font-bold">Criar tabelas</h2>
          </div>

          <p class="text-white/50 mb-6">Precisamos criar as tabelas no seu banco de dados. Escolha como:</p>

          <!-- Option A: Automatic with Access Token -->
          <div class="space-y-4 mb-6">
            <div class="bg-surface-800 rounded-xl p-5 border border-white/5 cursor-pointer hover:border-brand-500/30 transition-colors" onclick="showAutoMode()">
              <div class="flex items-center gap-3 mb-2">
                <span class="bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded-full">Recomendado</span>
                <p class="font-medium">Automatico (com Access Token)</p>
              </div>
              <p class="text-white/40 text-sm">Cole um Access Token do Supabase e as tabelas sao criadas automaticamente.</p>
            </div>

            <div class="bg-surface-800 rounded-xl p-5 border border-white/5 cursor-pointer hover:border-brand-500/30 transition-colors" onclick="showManualMode()">
              <p class="font-medium mb-1">Manual (copiar e colar SQL)</p>
              <p class="text-white/40 text-sm">Copie o SQL e cole no SQL Editor do Supabase. Simples tambem!</p>
            </div>
          </div>

          <!-- Auto mode panel -->
          <div id="auto-mode" class="hidden fade-in">
            <div class="bg-surface-800 rounded-xl p-5 border border-brand-500/20 mb-4">
              <p class="text-white/60 text-sm mb-3">Crie um Access Token em: <a href="https://supabase.com/dashboard/account/tokens" target="_blank" class="text-brand-500 hover:text-brand-400">supabase.com/dashboard/account/tokens</a></p>
              <input id="input-token" type="password" placeholder="sbp_xxxxx..." value="${state.accessToken}"
                class="w-full bg-surface-950 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 font-mono text-sm mb-3" />
              <button onclick="runAutoMigrations()" id="btn-auto-run" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 px-5 rounded-xl transition-all w-full">
                Criar tabelas automaticamente
              </button>
            </div>
            <div id="auto-progress" class="hidden"></div>
          </div>

          <!-- Manual mode panel -->
          <div id="manual-mode" class="hidden fade-in">
            <div class="bg-surface-800 rounded-xl p-5 border border-blue-500/20 mb-4">
              <div class="flex items-center justify-between mb-3">
                <p class="text-white/70 font-medium text-sm">SQL para criar as tabelas:</p>
                <button onclick="copySQL()" class="flex items-center gap-2 text-brand-500 hover:text-brand-400 text-sm font-medium">
                  ${icons.copy} Copiar SQL
                </button>
              </div>
              <textarea id="sql-output" readonly class="w-full bg-surface-950 border border-white/10 rounded-xl px-4 py-3 text-white/60 font-mono text-xs h-40 resize-none"></textarea>
              <div class="mt-3 space-y-2">
                <a id="link-sql-editor" href="#" target="_blank"
                   class="inline-flex items-center gap-2 text-brand-500 hover:text-brand-400 text-sm font-medium">
                  Abrir SQL Editor do Supabase ${icons.external}
                </a>
                <p class="text-white/40 text-xs">Cole o SQL la e clique "Run". Depois volte aqui e clique "Verificar".</p>
              </div>
            </div>
            <button onclick="verifyTables()" id="btn-verify" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 px-5 rounded-xl transition-all w-full">
              Verificar tabelas
            </button>
            <div id="verify-result" class="hidden mt-4"></div>
          </div>

          <!-- Navigation -->
          <div id="migration-nav" class="flex justify-between mt-6">
            <button onclick="prev()" class="text-white/50 hover:text-white py-2 px-4 rounded-lg transition-colors">Voltar</button>
            <button id="btn-next-mig" onclick="saveThenNext()" class="hidden bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 px-6 rounded-xl transition-all">
              Continuar
            </button>
          </div>
        </div>`;
    }

    function showAutoMode() {
      document.getElementById('auto-mode').classList.remove('hidden');
      document.getElementById('manual-mode').classList.add('hidden');
      state.migrationMode = 'auto';
    }

    async function showManualMode() {
      document.getElementById('manual-mode').classList.remove('hidden');
      document.getElementById('auto-mode').classList.add('hidden');
      state.migrationMode = 'manual';

      // Load SQL
      const sqlEl = document.getElementById('sql-output');
      try {
        const res = await fetch('/api/get-sql');
        const data = await res.json();
        sqlEl.value = data.sql || '-- Nenhuma migration encontrada';
      } catch {
        sqlEl.value = '-- Erro ao carregar SQL';
      }

      // Set SQL Editor link
      const ref = state.supabaseUrl.match(/https:\/\/([a-z0-9-]+)\.supabase\.co/)?.[1];
      if (ref) {
        document.getElementById('link-sql-editor').href = `https://supabase.com/dashboard/project/${ref}/sql/new`;
      }
    }

    async function copySQL() {
      const sql = document.getElementById('sql-output').value;
      await navigator.clipboard.writeText(sql);
      showToast('SQL copiado!');
    }

    async function runAutoMigrations() {
      const token = document.getElementById('input-token').value.trim();
      if (!token) { showToast('Cole o Access Token', 'error'); return; }
      state.accessToken = token;

      const btn = document.getElementById('btn-auto-run');
      btn.disabled = true;
      btn.innerHTML = `<span class="flex items-center justify-center gap-2">${icons.spinner} Criando tabelas...</span>`;

      const progressEl = document.getElementById('auto-progress');
      progressEl.classList.remove('hidden');

      try {
        // Get migration list first
        const listRes = await fetch('/api/migrations');
        const listData = await listRes.json();
        const migrations = listData.migrations || [];

        if (migrations.length === 0) {
          progressEl.innerHTML = '<p class="text-white/50 text-center">Nenhuma migration encontrada.</p>';
          document.getElementById('btn-next-mig').classList.remove('hidden');
          return;
        }

        // Show migration list
        progressEl.innerHTML = `
          <div class="mb-4">
            <div class="flex justify-between text-sm text-white/50 mb-2">
              <span id="mig-status">Iniciando...</span>
              <span id="mig-count">0/${migrations.length}</span>
            </div>
            <div class="w-full bg-surface-800 rounded-full h-3 overflow-hidden">
              <div id="mig-bar" class="h-full bg-gradient-to-r from-brand-600 to-blue-500 rounded-full progress-bar" style="width:0%"></div>
            </div>
          </div>
          <div id="mig-list" class="space-y-2 max-h-48 overflow-y-auto">
            ${migrations.map((m, i) => `
              <div class="flex items-center gap-3 bg-surface-800 rounded-xl px-4 py-2" id="mig-${i}">
                <div class="w-5 h-5 rounded-full bg-white/10 flex items-center justify-center flex-shrink-0" id="mig-i-${i}">
                  <div class="w-2 h-2 rounded-full bg-white/20"></div>
                </div>
                <span class="text-white/60 text-sm truncate">${m.name}</span>
              </div>
            `).join('')}
          </div>`;

        // Run migrations via server
        const res = await fetch('/api/run-migrations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: state.supabaseUrl, accessToken: state.accessToken }),
        });
        const data = await res.json();
        const results = data.migrations || [];

        // Animate results
        for (let i = 0; i < results.length; i++) {
          const r = results[i];
          const iconEl = document.getElementById(`mig-i-${i}`);
          if (r.success) {
            iconEl.innerHTML = icons.checkSmall;
            iconEl.className = 'w-5 h-5 rounded-full bg-green-500/20 flex items-center justify-center flex-shrink-0';
          } else {
            iconEl.innerHTML = icons.xSmall;
            iconEl.className = 'w-5 h-5 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0';
          }
          const pct = Math.round(((i + 1) / migrations.length) * 100);
          document.getElementById('mig-bar').style.width = `${pct}%`;
          document.getElementById('mig-count').textContent = `${i + 1}/${migrations.length}`;
          document.getElementById('mig-status').textContent = r.success ? r.name : `Erro: ${r.name}`;
          await delay(200);
        }

        const allOk = results.every(r => r.success);
        if (allOk) {
          document.getElementById('mig-status').textContent = 'Todas as tabelas criadas!';
        }
        document.getElementById('btn-next-mig').classList.remove('hidden');

      } catch (err) {
        progressEl.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-red-400 text-sm">${err.message}</div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Tentar novamente';
    }

    async function verifyTables() {
      const btn = document.getElementById('btn-verify');
      btn.disabled = true;
      btn.innerHTML = `<span class="flex items-center justify-center gap-2">${icons.spinner} Verificando...</span>`;

      try {
        const res = await fetch('/api/verify-tables', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: state.supabaseUrl, serviceRoleKey: state.serviceRoleKey }),
        });
        const data = await res.json();

        const resultEl = document.getElementById('verify-result');
        resultEl.classList.remove('hidden');

        const found = (data.tables || []).filter(t => t.exists).length;
        const total = (data.tables || []).length;

        if (data.success) {
          resultEl.innerHTML = `<div class="bg-green-500/10 border border-green-500/20 rounded-xl p-4 text-green-400 text-sm">
            Todas as ${total} tabelas encontradas! Tudo certo.</div>`;
          document.getElementById('btn-next-mig').classList.remove('hidden');
        } else {
          const missing = (data.tables || []).filter(t => !t.exists).map(t => t.table);
          resultEl.innerHTML = `<div class="bg-amber-500/10 border border-amber-500/20 rounded-xl p-4 text-amber-400 text-sm">
            ${found}/${total} tabelas encontradas. Faltam: ${missing.join(', ')}.<br>
            <span class="text-white/40">Verifique se rodou todo o SQL no SQL Editor.</span></div>`;
          document.getElementById('btn-next-mig').classList.remove('hidden');
          document.getElementById('btn-next-mig').textContent = 'Continuar mesmo assim';
        }
      } catch (err) {
        document.getElementById('verify-result').classList.remove('hidden');
        document.getElementById('verify-result').innerHTML = `<div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-red-400 text-sm">${err.message}</div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Verificar novamente';
    }

    async function saveThenNext() {
      try {
        await fetch('/api/save-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: state.supabaseUrl, anonKey: state.anonKey }),
        });
      } catch {}
      next();
    }

    // ── Step 6: Done ────────────────────────────────────────────────────────
    function renderDone() {
      return `
        <div class="p-10 text-center">
          <div class="w-20 h-20 bg-green-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">${icons.check}</div>
          <h1 class="text-3xl font-bold mb-3">Tudo pronto!</h1>
          <p class="text-white/60 text-lg mb-8">Seu CRM esta configurado e pronto para usar.</p>
          <button onclick="startCRM()" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-4 px-10 rounded-xl transition-all hover:scale-105 text-lg pulse-glow">
            Iniciar CRM
          </button>
          <div class="mt-10 text-left bg-surface-800 rounded-xl p-5 border border-white/5">
            <p class="text-white/70 font-medium mb-3">Opcional: Deploy de Edge Functions (IA)</p>
            <p class="text-white/40 text-sm mb-3">As funcoes de IA sao opcionais. O CRM funciona sem elas. Se quiser ativar:</p>
            <div class="bg-surface-950 rounded-lg p-3 font-mono text-sm text-white/60">npx supabase functions deploy</div>
          </div>
        </div>`;
    }

    async function startCRM() {
      try { await fetch('/api/finish', { method: 'POST' }); } catch {}
      document.getElementById('step-container').innerHTML = `
        <div class="p-10 text-center fade-in">
          <div class="w-10 h-10 border-4 border-brand-500 border-t-transparent rounded-full spin mx-auto mb-4"></div>
          <p class="text-white/60">Iniciando o CRM...</p>
          <p class="text-white/40 text-sm mt-2">O app vai abrir automaticamente em uma nova aba.</p>
        </div>`;
    }

    // ─── Boot ───────────────────────────────────────────────────────────────
    renderProgressDots();
    renderStep();
  </script>
</body>
</html>
